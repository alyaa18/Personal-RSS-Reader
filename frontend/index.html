<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar__brand">
        <p class="eyebrow">The Daily</p>
        <h1 class="brand-title">RSS Reader</h1>
      </div>

      <nav class="sidebar__nav">
        <button type="button" class="nav-item is-active" id="nav-all-articles" data-feed-id="all">
          <span class="nav-item__icon" aria-hidden="true">&#9776;</span>
          <span>All Articles</span>
        </button>
        <button type="button" class="nav-item" id="nav-starred">
          <span class="nav-item__icon" aria-hidden="true">&#9733;</span>
          <span>Starred</span>
        </button>
      </nav>

      <div class="sidebar__section">
        <div class="sidebar__section-head">
          <p class="sidebar__section-label">Feeds</p>
          <div class="feed-scroll-controls" aria-label="Feed list scroll controls">
            <button type="button" class="feed-scroll-btn" id="feed-scroll-left" aria-label="Scroll feeds left">&#8249;</button>
            <button type="button" class="feed-scroll-btn" id="feed-scroll-right" aria-label="Scroll feeds right">&#8250;</button>
          </div>
        </div>
        <ul class="feed-list" id="feed-list">
          <li class="feed-list__empty" id="feed-list-empty">
            No feeds yet. Add one below to get started.
          </li>
        </ul>
      </div>

    </aside>

    <main class="content">
      <header class="content__header">
        <h2 class="content__title" id="content-title">All Articles</h2>
        <div class="content__toolbar">
          <div class="content__actions">
            <button type="button" class="btn btn--primary" id="open-add-feed">
              <span aria-hidden="true">+</span> Add Feed
            </button>
            <button type="button" class="btn btn--ghost" id="refresh-all-feeds">
              <span aria-hidden="true">&#8635;</span> Refresh All
            </button>
          </div>
          <div class="search-field">
            <input type="search" id="search-input" class="search-field__input"
                   placeholder="Search articles by title or content…" aria-label="Search articles">
          </div>
        </div>
      </header>

      <div class="banner-region" id="banner-region" aria-live="polite"></div>

      <section class="article-list" id="article-list">
        <div class="state state--empty" id="state-empty">
          <div class="state__icon" aria-hidden="true">〜</div>
          <h3 class="state__title">Your reading list is empty</h3>
          <p class="state__body">
            Subscribe to RSS and Atom feeds to see a river of news from your favorite sites.
          </p>
          <button type="button" class="btn btn--primary" id="state-empty-cta">Add your first feed</button>
        </div>

        <div class="state state--loading is-hidden" id="state-loading">
          <div class="skeleton-card" aria-hidden="true">
            <div class="skeleton-line skeleton-line--meta"></div>
            <div class="skeleton-line skeleton-line--title"></div>
            <div class="skeleton-line skeleton-line--body"></div>
            <div class="skeleton-line skeleton-line--body short"></div>
          </div>
          <div class="skeleton-card" aria-hidden="true">
            <div class="skeleton-line skeleton-line--meta"></div>
            <div class="skeleton-line skeleton-line--title"></div>
            <div class="skeleton-line skeleton-line--body"></div>
            <div class="skeleton-line skeleton-line--body short"></div>
          </div>
          <div class="skeleton-card" aria-hidden="true">
            <div class="skeleton-line skeleton-line--meta"></div>
            <div class="skeleton-line skeleton-line--title"></div>
            <div class="skeleton-line skeleton-line--body"></div>
            <div class="skeleton-line skeleton-line--body short"></div>
          </div>
        </div>
      </section>

      <div class="pagination is-hidden" id="pagination"></div>
    </main>

  </div>

  <dialog class="modal" id="add-feed-dialog">
    <form class="modal__form" id="add-feed-form">
      <h2 class="modal__title">Add a feed</h2>
      <p class="modal__subtitle">Paste the URL of an RSS or Atom feed.</p>

      <label class="field-label" for="feed-url-input">Feed URL</label>
      <input type="url" id="feed-url-input" class="field-input" placeholder="https://example.com/rss.xml" required>

      <div class="modal__error is-hidden" id="add-feed-error"></div>

      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="cancel-add-feed">Cancel</button>
        <button type="submit" class="btn btn--primary" id="submit-add-feed">Add Feed</button>
      </div>
    </form>
  </dialog>

  <dialog class="modal modal--confirm" id="confirm-dialog">
    <div class="modal__form">
      <h2 class="modal__title" id="confirm-title">Are you sure?</h2>
      <p class="modal__subtitle" id="confirm-message"></p>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="confirm-cancel-btn">Cancel</button>
        <button type="button" class="btn btn--danger" id="confirm-action-btn">Confirm</button>
      </div>
    </div>
  </dialog>

  <template id="feed-item-template">
    <li class="feed-item" data-feed-id="">
      <button type="button" class="feed-item__button">
        <img class="feed-item__favicon" src="" alt="" width="16" height="16">
        <span class="feed-item__title"></span>
      </button>
      <div class="feed-item__actions">
        <button type="button" class="icon-btn feed-item__refresh" title="Refresh feed" aria-label="Refresh feed">&#8635;</button>
        <button type="button" class="icon-btn feed-item__remove" title="Remove feed" aria-label="Remove feed">&times;</button>
      </div>
    </li>
  </template>

  <template id="article-item-template">
    <article class="article-card">
      <div class="article-card__meta">
        <img class="article-card__favicon" src="" alt="" width="16" height="16">
        <span class="article-card__feed-title"></span>
        <span class="article-card__dot" aria-hidden="true">&middot;</span>
        <time class="article-card__date"></time>
      </div>
      <h3 class="article-card__title">
        <a class="article-card__link" href="#" target="_blank" rel="noopener noreferrer"></a>
      </h3>
      <p class="article-card__summary"></p>
      <button type="button" class="article-card__toggle is-hidden"></button>
      <div class="article-card__footer">
        <button type="button" class="article-card__star" aria-label="Add to favorites" aria-pressed="false">&#9734;</button>
      </div>
    </article>
  </template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <script src="js/api.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
